# config/services.yaml
# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
  # Exemple de param si tu veux en ajouter plus tard
  # app.some_param: 'value'

services:
  # Configuration par défaut pour les services définis ici
  _defaults:
    autowire: true
    autoconfigure: true
    bind:
      # Injecte APP_SECRET automatiquement dans tout argument nommé $appSecret
      $appSecret: '%env(APP_SECRET)%'

  # Rend toutes les classes de src/ disponibles comme services
  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Kernel.php'

  # (Optionnel) Si tu as un dossier "Tests" dans src
  # - '../src/Tests/'
